name: Release Builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: s30_linux_amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: s30_mac_amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: s30_mac_arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: s30.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Build
        run: CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ inputs.version }} \
            --title "${{ inputs.version }}" \
            --generate-notes \
            artifacts/s30_linux_amd64/s30_linux_amd64 \
            artifacts/s30_mac_amd64/s30_mac_amd64 \
            artifacts/s30_mac_arm64/s30_mac_arm64 \
            artifacts/s30.exe/s30.exe
