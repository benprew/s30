name: Release Builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: s30_linux
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: s30_linux-arm
          - os: macos-13
            goos: darwin
            goarch: amd64
            artifact: s30_mac-intel
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: s30_mac-apple-silicon
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: s30_windows.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact: s30_windows-arm.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Build
        run: CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Build AAR with ebitenmobile
        run: |
          go run github.com/hajimehoshi/ebiten/v2/cmd/ebitenmobile bind \
            -target android \
            -javapkg com.benprew.s30 \
            -o ./mobile/android/s30/s30.aar \
            ./mobile

      - name: Build APK with Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release APK
        working-directory: ./mobile/android
        run: gradle assembleRelease

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk s30_android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: s30_android.apk
          path: s30_android.apk

  release:
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ inputs.version }} \
            --title "${{ inputs.version }}" \
            --generate-notes \
            artifacts/s30_linux/s30_linux \
            artifacts/s30_linux-arm/s30_linux-arm \
            artifacts/s30_mac-intel/s30_mac-intel \
            artifacts/s30_mac-apple-silicon/s30_mac-apple-silicon \
            artifacts/s30_windows.exe/s30_windows.exe \
            artifacts/s30_windows-arm.exe/s30_windows-arm.exe \
            artifacts/s30_android.apk/s30_android.apk
