name: Release Builds

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o s30_mac_amd64

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o s30_mac_arm64

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 go build -o s30.exe

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o s30_linux_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: s30-builds
          path: |
            s30_mac_amd64
            s30_mac_arm64
            s30.exe
            s30_linux_amd64
