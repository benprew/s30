version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  settings:
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    misspell:
      locale: US
    lll:
      line-length: 120
  enable:
    - govet
    - gocyclo
    - misspell
    - ineffassign
    - staticcheck
    - unused
  disable:
    - errcheck # Disabled due to Ebiten game engine patterns
    - goconst # Repeated strings are often card/player/game-state data, not rules vocabulary.
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gocyclo
          - dupl
