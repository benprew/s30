# Deck-changing quests. The Wiseman offers these alongside delivery/defeat
# quests; the efficient way to complete most of them is to re-tune your deck.
#
# Fields:
#   id            unique slug
#   type          "action" (passive tracker) or "constraint" (win under a rule)
#   title         short scroll heading
#   description   one-line objective shown on the quest scroll/overlay
#   deadline_days days before the quest expires
#   reward_tier   "standard" | "themed" | "challenge"
#
#   action quests:    metric, target, plus color / card_type when relevant
#   constraint quests: constraint, plus color / n when relevant
#
# metric:     cast_color | play_lands | attack_creatures |
#             destroy_enemy_creatures | cast_type | direct_damage
# constraint: mono_color | fat_deck | low_curve | color_light | no_attacking
# color:      WUBRG letters ("R", "RB") or a name ("red"); used by cast_color,
#             color_light, mono_color (optional target)

# --- Passive action quests ---

[[quest]]
id = "cast_black_red"
type = "action"
title = "Spells of Shadow & Flame"
description = "Cast 30 black or red spells"
